---
name: Get data from GA

on:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron: '0 4 * * 5'
  workflow_dispatch:

env:
  python-version: "3.11"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ env.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ env.python-version }}
      - name: Install the default version of uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Decrypt large secret
        run: ./decrypt_secret.sh
        env:
          GPG_SECRET_PASSPHRASE: ${{ secrets.GPG_SECRET_PASSPHRASE }}
      - name: install python requirements
        run: uv sync
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest
      - name: get data
        run: |
          make download-data
      - name: deploy to github pages
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: data
          publish_dir: static/data
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  recommendation:
    runs-on: ubuntu-latest
    needs: [publish]  # require tests to pass before deploy runs

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ env.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ env.python-version }}
      - name: Install the default version of uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: install python requirements
        run: uv sync
      - name: Get commits historical data
        run: uv run fetch.py
      - name: Run recommendation
        run: uv run recommendation.py
        env:
          NOTIFICATION_URL: ${{ secrets.NOTIFICATION_URL }}
